<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shieldBg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0e3d14"/>
      <stop offset="100%" stop-color="#010c02"/>
    </radialGradient>
    <radialGradient id="ballGrad" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
  </defs>

  <!-- Shield background -->
  <path d="M50 4 L94 18 L94 58 Q94 90 50 110 Q6 90 6 58 L6 18 Z"
        fill="url(#shieldBg)"/>

  <!-- Shield outer border (neon glow) -->
  <path d="M50 4 L94 18 L94 58 Q94 90 50 110 Q6 90 6 58 L6 18 Z"
        fill="none" stroke="#1fdd60" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Shield inner border -->
  <path d="M50 11 L87 23 L87 57 Q87 85 50 103 Q13 85 13 57 L13 23 Z"
        fill="none" stroke="#1fdd60" stroke-width="0.7" opacity="0.35"/>

  <!-- Radar grid lines -->
  <line x1="50" y1="20" x2="50" y2="98" stroke="#1fdd60" stroke-width="0.5" opacity="0.3"/>
  <line x1="14"  y1="57" x2="86" y2="57" stroke="#1fdd60" stroke-width="0.5" opacity="0.3"/>
  <line x1="23"  y1="30" x2="77" y2="84" stroke="#1fdd60" stroke-width="0.4" opacity="0.2"/>
  <line x1="77"  y1="30" x2="23" y2="84" stroke="#1fdd60" stroke-width="0.4" opacity="0.2"/>

  <!-- Radar circles -->
  <circle cx="50" cy="57" r="32" fill="none" stroke="#1fdd60" stroke-width="0.6" opacity="0.25"/>
  <circle cx="50" cy="57" r="22" fill="none" stroke="#1fdd60" stroke-width="0.7" opacity="0.35"/>
  <circle cx="50" cy="57" r="13" fill="none" stroke="#1fdd60" stroke-width="0.9" opacity="0.5"/>

  <!-- Radar sweep line -->
  <line x1="50" y1="57" x2="77" y2="31" stroke="#1fdd60" stroke-width="2" stroke-linecap="round"
        filter="url(#glow)" opacity="0.95"/>

  <!-- Sweep fade arc -->
  <path d="M50 57 L77 31 A32 32 0 0 1 82 57" fill="#1fdd60" opacity="0.07"/>

  <!-- Football -->
  <circle cx="50" cy="57" r="10" fill="url(#ballGrad)" filter="url(#glow-soft)"/>
  <!-- Black patches -->
  <polygon points="50,48 54,51 53,55 47,55 46,51" fill="#111" opacity="0.85"/>
  <polygon points="60,53 63,57 60,61 56,60 56,54" fill="#111" opacity="0.85"/>
  <polygon points="40,53 37,57 40,61 44,60 44,54" fill="#111" opacity="0.85"/>
  <polygon points="53,62 50,66 47,62 48,58 52,58" fill="#111" opacity="0.85"/>
</svg>
