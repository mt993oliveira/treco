<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 75">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shieldBg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0e3d14"/>
      <stop offset="100%" stop-color="#010c02"/>
    </radialGradient>
    <radialGradient id="ballGrad" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <linearGradient id="radarText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8ffd8"/>
    </linearGradient>
    <linearGradient id="betText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2eff7a"/>
      <stop offset="100%" stop-color="#0fa83a"/>
    </linearGradient>
  </defs>

  <!-- ── SHIELD ICON ── -->
  <!-- Background -->
  <path d="M37 3 L68 12 L68 38 Q68 58 37 70 Q6 58 6 38 L6 12 Z"
        fill="url(#shieldBg)"/>
  <!-- Border neon -->
  <path d="M37 3 L68 12 L68 38 Q68 58 37 70 Q6 58 6 38 L6 12 Z"
        fill="none" stroke="#1fdd60" stroke-width="1.8" filter="url(#glow)"/>
  <!-- Inner border -->
  <path d="M37 8 L63 16 L63 37 Q63 55 37 65 Q11 55 11 37 L11 16 Z"
        fill="none" stroke="#1fdd60" stroke-width="0.6" opacity="0.3"/>

  <!-- Radar grid -->
  <line x1="37" y1="14" x2="37" y2="62" stroke="#1fdd60" stroke-width="0.4" opacity="0.3"/>
  <line x1="11"  y1="37" x2="63" y2="37" stroke="#1fdd60" stroke-width="0.4" opacity="0.3"/>
  <line x1="18"  y1="20" x2="56" y2="54" stroke="#1fdd60" stroke-width="0.3" opacity="0.18"/>
  <line x1="56"  y1="20" x2="18" y2="54" stroke="#1fdd60" stroke-width="0.3" opacity="0.18"/>

  <!-- Radar circles -->
  <circle cx="37" cy="37" r="20" fill="none" stroke="#1fdd60" stroke-width="0.5" opacity="0.22"/>
  <circle cx="37" cy="37" r="14" fill="none" stroke="#1fdd60" stroke-width="0.6" opacity="0.3"/>
  <circle cx="37" cy="37" r="8"  fill="none" stroke="#1fdd60" stroke-width="0.7" opacity="0.45"/>

  <!-- Sweep line -->
  <line x1="37" y1="37" x2="56" y2="20" stroke="#1fdd60" stroke-width="1.6" stroke-linecap="round"
        filter="url(#glow)" opacity="0.95"/>
  <path d="M37 37 L56 20 A20 20 0 0 1 57 37" fill="#1fdd60" opacity="0.07"/>

  <!-- Football -->
  <circle cx="37" cy="37" r="7" fill="url(#ballGrad)" filter="url(#glow-soft)"/>
  <polygon points="37,31 40,33 39.5,37 34.5,37 34,33" fill="#111" opacity="0.85"/>
  <polygon points="44,34.5 46,37 44,39.5 41,39 41,34.5" fill="#111" opacity="0.85"/>
  <polygon points="30,34.5 28,37 30,39.5 33,39 33,34.5" fill="#111" opacity="0.85"/>
  <polygon points="39.5,40 37,43 34.5,40 35,37.5 39,37.5" fill="#111" opacity="0.85"/>

  <!-- ── TEXT ── -->
  <!-- RADAR -->
  <text x="86" y="30"
        font-family="'Arial Black','Impact','Arial',sans-serif"
        font-size="28" font-weight="900" font-style="italic"
        letter-spacing="1"
        fill="url(#radarText)">RADAR</text>

  <!-- DA -->
  <text x="89" y="44"
        font-family="'Arial','Helvetica',sans-serif"
        font-size="10" font-weight="700" font-style="italic"
        letter-spacing="4"
        fill="#a0e8b8" opacity="0.85">DA</text>

  <!-- BET -->
  <text x="83" y="66"
        font-family="'Arial Black','Impact','Arial',sans-serif"
        font-size="30" font-weight="900" font-style="italic"
        letter-spacing="1"
        fill="url(#betText)" filter="url(#glow-text)">BET</text>

  <!-- Separator line between DA and BET -->
  <line x1="83" y1="48" x2="200" y2="48" stroke="#1fdd60" stroke-width="0.5" opacity="0.25"/>
</svg>
